# order-service만의 설정파일
spring:
    datasource:
        url: jdbc:mysql://localhost:3306/msa_step02_order?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# 서비스 디스커버리 설정(lh:8081대신 payment-service라는 이름으로 결제 서비스를 탐색)
# payment-service의 이름은 spring.application.name을 기반으로 함
service:
    payment:
        url: http://payment-service/payments

server:
    port: 8080

logging:
    level:
        com.netflix.eureka: TRACE
        com.netflix.discovery: TRACE

# cloud config 테스트용 설정 값
custom:
    message: "테스트메시지입니다444."
    version: "4.0.0"
